<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="380" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">reqrun — run the .http files your editor already understands</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> cat api.http</text>
  <text x="20" y="76" fill="#5c6370">### login</text>
  <text x="20" y="94" fill="#c8ceda">POST {{base}}/login</text>
  <text x="20" y="112" fill="#c8ceda">Content-Type: application/json</text>
  <text x="20" y="130" fill="#c8ceda">{"user": "admin"}</text>
  <text x="20" y="148" fill="#c8ceda">&gt; {% <tspan fill="#61afef">client.assert</tspan>(response.status === 200);</text>
  <text x="20" y="166" fill="#c8ceda">     <tspan fill="#61afef">client.global.set</tspan>("token", response.body.token); %}</text>

  <text x="20" y="196" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> reqrun api.http --env staging --report junit.xml</text>
  <text x="20" y="216" fill="#c8ceda">api.http</text>
  <text x="20" y="234" fill="#c8ceda">  <tspan fill="#28c840">PASS</tspan>  health (200 OK, 12ms) [2/2 checks]</text>
  <text x="20" y="252" fill="#c8ceda">  <tspan fill="#28c840">PASS</tspan>  login (200 OK, 34ms) [1/1 checks]</text>
  <text x="20" y="270" fill="#c8ceda">  <tspan fill="#e06c75">FAIL</tspan>  whoami (403 Forbidden, 8ms) [1/2 checks]</text>
  <text x="20" y="288" fill="#e06c75">        not ok token maps to amy (assert: response.body.user === 'amy')</text>
  <text x="20" y="306" fill="#c8ceda">3 request(s): 2 passed, <tspan fill="#e06c75">1 failed</tspan> — 5 check(s)</text>

  <text x="20" y="334" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> echo $?   <tspan fill="#5c6370"># CI-ready exit code + junit.xml</tspan></text>
  <text x="20" y="354" fill="#c8ceda">1</text>
</svg>
